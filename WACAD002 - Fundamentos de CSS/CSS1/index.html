<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 1</title>
    <style>
        p {
            border: 8px, solid, black;
            width: 400px;
            border-radius: 16px 50px;
            padding: 16px;
            background-color: rgb(214, 211, 211);
        }
    </style>
</head>
<body>
    <p>O CSS é uma linguage de estilo, também conhecida como linguagem de folhas de estilo em cascata, usada para personalisar o visual de um site ou aplicação.</p>
</body>
</html>

<!DOCTYPE html>
<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <div id="app-tarefas">
    <h3>Minhas Tarefas</h3>
    
    <!-- Campo de digitação e botão de ação -->
    <input type="text" id="input-nova-tarefa" placeholder="Digite uma tarefa...">
    <button id="btn-adicionar">Adicionar Tarefa</button>

    <!-- Lista onde as tarefas vão aparecer -->
    <ul id="lista-tarefas">
    </ul>
    </div>
    <script>
        const inputNewTask = document.getElementById('input-nova-tarefa');
        const btnAddTask = document.getElementById('btn-adicionar');
        const taskList = document.getElementById('lista-tarefas');

        btnAddTask.addEventListener('click', () => {
            const taskText = inputNewTask.value.trim();
            if (taskText !== '') {
                const newTaskItem = document.createElement('li');
                newTaskItem.textContent = taskText;
                taskList.appendChild(newTaskItem);
                inputNewTask.value = '';
            }
        });


    </script>
</body>
</html>

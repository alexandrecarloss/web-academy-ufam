<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />

    <title>Gerador de História Maluca</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>📖 Gerador de História Aleatória</h1>

    <div>
      <label for="customname">Nome personalizado:</label>
      <input id="customname" type="text" placeholder="Digite um nome..." />
    </div>

    <div>
      <label>Idioma:</label>
      <label>
        <input type="radio" name="lang" value="pt" checked />
        PT
      </label>
      <label>
        <input type="radio" name="lang" value="en" />
        EN
      </label>
    </div>

    <div>
      <button class="randomize">Gerar história</button>
    </div>

    <p class="story"></p>

    <script src="main.js"></script>
  </body>
</html>

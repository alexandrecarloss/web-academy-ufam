<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light py-5">
    <div class="container" style="max-width: 700px;">
      
      <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
          <h1 class="card-title text-center h3 mb-4">Minha Lista de Tarefas</h1>

          <form id="form-lembrete">
            <input type="hidden" id="lembrete-id" />

            <div class="row g-3">
              <div class="col-md-7">
                <label for="titulo" class="form-label fw-semibold">Título *</label>
                <input
                  type="text"
                  id="titulo"
                  class="form-control"
                  required
                  placeholder="Estudar TypeScript"
                />
              </div>

              <div class="col-md-5">
                <label for="data-limite" class="form-label fw-semibold">Data Limite (Opcional)</label>
                <input type="datetime-local" id="data-limite" class="form-control" />
              </div>

              <div class="col-12">
                <label for="descricao" class="form-label fw-semibold">Descrição (Opcional)</label>
                <textarea
                  id="descricao"
                  class="form-control"
                  rows="3"
                  placeholder="Detalhes da atividade..."
                ></textarea>
              </div>

              <div class="col-12 d-flex gap-2 justify-content-end mt-4">
                <button type="button" id="btn-cancelar" class="btn btn-secondary d-none">
                  Cancelar Edição
                </button>
                <button type="submit" id="btn-salvar" class="btn btn-primary px-4">
                  Adicionar Lembrete
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3 mt-5">
        <h2 class="h4 m-0 text-secondary">Tarefas Pendentes</h2>
      </div>
      
      <div id="lista-lembretes" class="d-flex flex-column gap-3"></div>

    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="dist/app.js" type="module"></script>
  </body>
</html>

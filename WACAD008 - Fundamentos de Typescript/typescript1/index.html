<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Minha lista de tarefas</h1>

    <form id="form-lembrete">
      <input type="hidden" id="lembrete-id">

      <div class="form-group">
        <label for="titulo">Título *</label>
        <input type="text" id="titulo" required placeholder="Estudar TypeScript">
      </div>

      <div class="form-group">
        <label for="data-limite">Data Limite (Opcional)</label>
        <input type="datetime-local" id="data-limite">
      </div>

      <div class="form-group">
        <label for="descricao">Descrição (Opcional)</label>
        <textarea id="descricao" rows="3" placeholder="Detalhes da atividade..."></textarea>
      </div>

      <button type="submit" id="btn-salvar">Adicionar Lembrete</button>
      <button type="button" id="btn-cancelar" class="hidden">Cancelar Edição</button>
    </form>

    <hr>

    <h2>Tarefas Pendentes</h2>
    <ul id="lista-lembretes">
      </ul>
  </div>

  <script src="dist/app.js" type="module"></script>
</body>
</html>
